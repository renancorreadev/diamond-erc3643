name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Contracts (Foundry)
  # ─────────────────────────────────────────────
  contracts-lint:
    name: Contracts / Lint (solhint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @diamond-erc3643/contracts lint

  contracts-build:
    name: Contracts / Build & Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - run: forge build --sizes
        working-directory: packages/contracts

  contracts-test:
    name: Contracts / Tests
    runs-on: ubuntu-latest
    needs: contracts-build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - run: forge test -vvv
        working-directory: packages/contracts

  contracts-fuzz:
    name: Contracts / Fuzz Tests
    runs-on: ubuntu-latest
    needs: contracts-build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - run: forge test --match-path "test/fuzz/**" --fuzz-runs 10000
        working-directory: packages/contracts

  contracts-invariant:
    name: Contracts / Invariant Tests
    runs-on: ubuntu-latest
    needs: contracts-build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - run: forge test --match-path "test/invariant/**" --fuzz-runs 10000
        working-directory: packages/contracts

  contracts-slither:
    name: Contracts / Slither
    runs-on: ubuntu-latest
    needs: contracts-build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install slither-analyzer
      - run: slither . --config-file slither.config.json
        working-directory: packages/contracts

  contracts-coverage:
    name: Contracts / Coverage
    runs-on: ubuntu-latest
    needs: contracts-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - run: forge coverage --report lcov
        working-directory: packages/contracts

      - uses: codecov/codecov-action@v4
        with:
          files: packages/contracts/lcov.info
          flags: contracts

  # ─────────────────────────────────────────────
  # Indexer (TypeScript)
  # ─────────────────────────────────────────────
  indexer-lint-test:
    name: Indexer / Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @diamond-erc3643/indexer lint
      - run: pnpm --filter @diamond-erc3643/indexer build

  # ─────────────────────────────────────────────
  # Web (React)
  # ─────────────────────────────────────────────
  web-lint-build:
    name: Web / Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @diamond-erc3643/web lint
      - run: pnpm --filter @diamond-erc3643/web build
